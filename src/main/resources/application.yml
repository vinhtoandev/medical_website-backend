spring:
  application:
    name: derma-insight-api
  
  # DataSource Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:derma_insight}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  
  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      jdbc:
        batch-size: 20
        fetch-size: 50
      format-sql: true
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: true
        jdbc:
          batch-versioned-data: true
        order-inserts: true
        order-updates: true
    show-sql: false
    open-in-view: false
  
  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
  
  # Security Configuration
  security:
    user:
      name: admin
      password: demo

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production-min-32-chars}
  access-token-expiration: 3600000  # 1 hour in milliseconds
  refresh-token-expiration: 2592000000  # 30 days in milliseconds

# AWS Configuration
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET:derma-insight-dev}
    region: ${AWS_REGION:us-east-1}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  
# OpenAI Configuration
openai:
  api-key: ${OPENAI_API_KEY:}
  api-url: https://api.openai.com/v1
  embedding-model: text-embedding-3-small
  embedding-dimensions: 1536

# Logging Configuration
logging:
  level:
    root: INFO
    com.example.demo: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

# Actuator Configuration (for health checks)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Springdoc OpenAPI Configuration (Swagger)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  show-actuator: false
